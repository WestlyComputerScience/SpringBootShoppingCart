spring.application.name=shoppingCart

spring.config.import=optional:classpath:application-secret-two.properties

server.port = 8081

spring.datasource.url=jdbc:mysql://localhost:3306/shopping_cart_db
spring.datasource.username=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring Boot auto-detects this now
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#(create, update, create-drop, validate)
spring.jpa.hibernate.ddl-auto=create

#api request mapping prefix
api.prefix=/api/v1
